<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>AR Highway Navigation</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <div style="position: fixed; top: 20px; width: 100%; text-align: center; z-index: 10; color: white; font-family: Arial; font-weight: bold; text-shadow: 2px 2px 4px black; background-color: rgba(0,0,0,0.5); padding: 10px 0;">
        اتبع أسهم الطريق الأخضر للوصول لوجهتك
    </div>

    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <img id="arrow-texture" src="https://i.imgur.com/8f8K4R1.png" crossorigin="anonymous">
        </a-assets>

        <a-camera gps-camera rotation-reader far="10000"></a-camera>

        <a-entity 
            id="destination"
            gps-entity-place="latitude: 24.4674; longitude: 39.6111;"
            visible="false">
        </a-entity>

    </a-scene>

    <script>
        let isPathDrawn = false;

        // دالة لرسم مسار الأسهم الواقعي
        function drawHighwayPath() {
            if (isPathDrawn) return; // ارسمه مرة واحدة فقط

            const scene = document.querySelector('a-scene');
            const numArrows = 30; // عدد الأسهم في المسار
            const gap = 4; // المسافة بين كل سهم (4 متر)

            for (let i = 1; i <= numArrows; i++) {
                // إنشاء سطح مستوٍ (Plane) لكل سهم
                const arrowPlane = document.createElement('a-plane');
                
                arrowPlane.setAttribute('id', `road-arrow-${i}`);
                // استخدام الصورة المحملة كخامة (Texture)
                arrowPlane.setAttribute('src', '#arrow-texture');
                // ضبط الحجم: عريض وطويل ليشبه علامات الطريق
                arrowPlane.setAttribute('width', '2'); 
                arrowPlane.setAttribute('height', '4');
                // جعل الخامة شفافة لتظهر الخلفية فقط
                arrowPlane.setAttribute('material', 'transparent: true; opacity: 1; shader: flat;');
                
                // التموضع: ملقى على الأرض مباشرة
                // النقطة (0,0,0) في AR.js هي موقع المستخدم البدئي.
                // -1.6 هو الارتفاع التقريبي للكاميرا عن الأرض.
                const zPos = -(i * gap);
                arrowPlane.setAttribute('position', `0 -1.58 ${zPos}`); 
                
                // الدوران: مفلطح على الأرض وموجه للأمام
                // rotation: X Y Z (X -90 تجعله مستلقياً)
                arrowPlane.setAttribute('rotation', '-90 0 0');
                
                // إضافة أنيميشن بسيط لجعل الأسهم تظهر تباعاً (تأثير نبض)
                // arrowPlane.setAttribute('animation__pulse', `property: scale; from: 1 1 1; to: 1.1 1.1 1; dur: 1000; dir: alternate; loop: true; delay: ${i * 100}`);

                scene.appendChild(arrowPlane);
            }
            isPathDrawn = true;
            console.log("Highway path with textures drawn.");
        }

        // انتظر حتى يتم تحديد موقع الـ GPS الأول ثم ارسم المسار
        window.addEventListener('gps-camera-update-position', (e) => {
            // تحديث موقع الوجهة بناءً على موقع المستخدم الفعلي (ضروري لـ AR.js)
            // في هذا المثال البسيط، نحن نزرع الأسهم مباشرة أمام المستخدم،
            // لكن في التطبيق الحقيقي، ستحتاج لحساب الزاوية نحو الهدف.
            
            // للحفاظ على بساطة الكود وضمان عمل الأسهم "أمامك" مباشرة:
            drawHighwayPath();
        });
    </script>
</body>
</html>
