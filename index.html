<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>Lumi AR Navigation - Fixed</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <div style="position: fixed; top: 20px; width: 100%; text-align: center; z-index: 10; color: #ffffff; font-family: 'Arial', sans-serif; pointer-events: none;">
        <div style="background: rgba(0, 0, 0, 0.8); display: inline-block; padding: 15px 25px; border-radius: 20px; border: 1px solid #00FF00; box-shadow: 0 0 15px rgba(0,255,0,0.3);">
            <div style="font-size: 12px; color: #00FF00; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">المسافة المتبقية لمواقف لومي</div>
            <div id="distance-display" style="font-size: 23px; font-weight: bold;">جاري تحديد الموقع...</div>
        </div>
    </div>

    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
        
        <a-assets>
            <img id="my-arrow" src="https://i.postimg.cc/brj5SLrn/240-F-341860718-Weyx-Hj3AZVe1gd-CRc0Yn4Wk296ew-LDmi-removebg-preview.png" crossorigin="anonymous">
            <img id="lumi-logo" src="https://i.postimg.cc/YqXwTKj3/Lumi-01.png" crossorigin="anonymous">
        </a-assets>

        <a-camera gps-camera="minDistance: 1;" rotation-reader far="10000"></a-camera>

        <a-entity id="lumi-target" gps-entity-place="latitude: 28.370345; longitude: 36.596866;">
            <a-image src="#lumi-logo" position="0 5 0" scale="6 6 6" animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear"></a-image>
            <a-cylinder color="#00FF00" height="200" radius="0.15" opacity="0.3"></a-cylinder>
            <a-text value="LUMI STATION" align="center" color="#00FF00" position="0 8 0" scale="10 10 10"></a-text>
        </a-entity>

    </a-scene>

    <script>
        let arrowsCreated = false;
        const distanceElement = document.getElementById('distance-display');

        window.addEventListener('gps-camera-update-position', (e) => {
            // محاولة جلب المسافة من مصدرين لضمان عدم التعليق
            const targetEl = document.querySelector('#lumi-target');
            
            // الطريقة 1: من تفاصيل الحدث مباشرة
            let distance = e.detail.distance;

            // الطريقة 2: إذا فشلت الأولى، نسحبها من خاصية الكيان المسجلة في AR.js
            if (distance === undefined || distance === null) {
                distance = targetEl.getAttribute('distance');
            }

            if (distance !== undefined && distance !== null) {
                const dist = Math.round(distance);
                distanceElement.innerText = dist + " متر";
                
                // تنبيه الوصول
                if(dist < 7) {
                    distanceElement.innerText = "🚩 وصلت للوجهة";
                    distanceElement.style.color = "#FFD700";
                }
            }

            // رسم الأسهم (مرة واحدة فقط)
            if (!arrowsCreated) {
                const scene = document.querySelector('a-scene');
                for (let i = 1; i <= 30; i++) {
                    const arrow = document.createElement('a-plane');
                    arrow.setAttribute('src', '#my-arrow');
                    arrow.setAttribute('width', '2'); 
                    arrow.setAttribute('height', '4');
                    arrow.setAttribute('material', 'transparent: true; shader: flat; side: double;');
                    arrow.setAttribute('position', `0 -1.6 ${-(i * 4)}`); 
                    arrow.setAttribute('rotation', '-90 0 0');
                    scene.appendChild(arrow);
                }
                arrowsCreated = true;
            }
        });
    </script>
</body>
</html>
