<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>Lumi AR Navigation</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <div style="position: fixed; top: 20px; width: 100%; text-align: center; z-index: 10; color: #ffffff; font-family: 'Arial', sans-serif; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none;">
        <div style="background: rgba(0, 255, 0, 0.2); display: inline-block; padding: 10px 20px; border-radius: 50px; border: 1px solid #00FF00;">
            اتبع الأسهم للوصول إلى موقف لومي 
        </div>
    </div>

    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <img id="my-arrow" src="https://i.postimg.cc/brj5SLrn/240-F-341860718-Weyx-Hj3AZVe1gd-CRc0Yn4Wk296ew-LDmi-removebg-preview.png" crossorigin="anonymous">
            
            <img id="lumi-logo" src="https://i.postimg.cc/YqXwTKj3/Lumi-01.png" crossorigin="anonymous">
        </a-assets>

        <a-camera gps-camera rotation-reader far="10000"></a-camera>

        <a-entity id="destination" gps-entity-place="latitude: 28.368388; longitude: 36.573226;">
            
            <a-image 
                src="#lumi-logo" 
                position="0 5 0" 
                scale="6 6 6"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear">
            </a-image>
            
            <a-cylinder 
                color="#00FF00" 
                height="200" 
                radius="0.15" 
                opacity="0.3" 
                position="0 0 0">
            </a-cylinder>

            <a-text value="LUMI STATION" align="center" color="#00FF00" position="0 8 0" scale="10 10 10"></a-text>
        </a-entity>

    </a-scene>

    <script>
        let arrowsCreated = false;

        window.addEventListener('gps-camera-update-position', (e) => {
            if (arrowsCreated) return;

            const scene = document.querySelector('a-scene');
            const numArrows = 30; // عدد الأسهم الممتدة على الطريق
            const spacing = 4;    // المسافة بين الأسهم

            for (let i = 1; i <= numArrows; i++) {
                const arrow = document.createElement('a-plane');
                
                arrow.setAttribute('src', '#my-arrow');
                arrow.setAttribute('width', '2'); 
                arrow.setAttribute('height', '4');
                arrow.setAttribute('material', 'transparent: true; shader: flat; side: double;');
                
                // التموضع على الأرض
                const zPos = -(i * spacing);
                arrow.setAttribute('position', `0 -1.6 ${zPos}`); 
                
                // جعل السهم مسطحاً تماماً على الأرض
                arrow.setAttribute('rotation', '-90 0 0');
                
                scene.appendChild(arrow);
            }
            arrowsCreated = true;
            console.log("Lumi navigation path initialized.");
        });
    </script>
</body>
</html>
