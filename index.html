<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>AR Navigation - Green Line</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <div style="position: fixed; top: 20px; width: 100%; text-align: center; z-index: 10; color: #00FF00; font-family: Arial; font-weight: bold; text-shadow: 1px 1px 2px black;">
        جاري تحديد الموقع... تحرك ببطء لضبط البوصلة
    </div>

    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;">

        <a-camera gps-camera rotation-reader far="10000"></a-camera>

        <a-entity 
            id="target"
            gps-entity-place="latitude: 28.368777; longitude: 36.573467

;"
            geometry="primitive: cylinder; radius: 1; height: 100;"
            material="color: #00FF00; opacity: 0.5; shader: flat;">
            
            <a-cone color="#00FF00" position="0 20 0" rotation="180 0 0" scale="3 3 3"></a-cone>
            <a-text value="DESTINATION" align="center" position="0 25 0" scale="20 20 20" color="#00FF00"></a-text>
        </a-entity>

        <a-entity id="path-line" line="start: 0 -1.6 0; end: 0 -1.6 -50; color: #00FF00"></a-entity>

    </a-scene>

    <script>
        // تحديث اتجاه المسار الأخضر بناءً على حركة المستخدم
        window.addEventListener('gps-camera-update-position', (e) => {
            const lineEntity = document.querySelector('#path-line');
            
            // جعل الخط الأخضر يمتد دائماً للأمام باتجاه الهدف في عالم AR
            // ملاحظة: الخط يظهر بطول 100 متر ليدلك على الاتجاه الصحيح
            lineEntity.setAttribute('line', {
                start: '0 -1.6 0', 
                end: '0 -1.6 -100', 
                color: '#00FF00',
                opacity: 1
            });
            
            console.log("Position updated, path adjusted.");
        });

        // تنبيه في حال عدم دعم البوصلة
        window.addEventListener('deviceorientationabsolute', (event) => {
            if (event.absolute === false) {
                alert("جهازك قد لا يدعم البوصلة بدقة، قد لا يظهر المسار في الاتجاه الصحيح.");
            }
        });
    </script>
</body>
</html>
