<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>Lumi AR Navigation - Final</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    
    <style>
        /* عداد المسافة - تصميم عصري وواضح */
        #distance-card {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 5px solid #00FF00;
            border-radius: 15px;
            padding: 20px;
            width: 80%;
            text-align: center;
            color: white;
            font-family: Arial, sans-serif;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        #dist-text {
            font-size: 35px;
            font-weight: bold;
            color: #00FF00;
            display: block;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="distance-card">
        <div style="font-size: 12px; opacity: 0.7; letter-spacing: 2px; margin-bottom: 5px;">المسافة المتبقية لمواقف لومي</div>
        <span id="dist-text">انتظر إشارة الـ GPS...</span>
    </div>

    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
        
        <a-assets>
            <img id="arrow-tex" src="https://i.postimg.cc/brj5SLrn/240-F-341860718-Weyx-Hj3AZVe1gd-CRc0Yn4Wk296ew-LDmi-removebg-preview.png" crossorigin="anonymous">
            <img id="lumi-logo" src="https://i.postimg.cc/YqXwTKj3/Lumi-01.png" crossorigin="anonymous">
        </a-assets>

        <a-camera gps-camera="minDistance: 1;" rotation-reader></a-camera>

        <a-entity id="lumi-destination" gps-entity-place="latitude: 28.370348; longitude: 36.596865;">
            <a-image src="#lumi-logo" rotation="-90 0 0" scale="12 12 12" position="0 -1.5 0"></a-image>
            <a-cylinder color="#00FF00" height="500" radius="0.1" opacity="0.4" position="0 250 0"></a-cylinder>
            <a-text value="LUMI STATION" align="center" color="#00FF00" position="0 10 0" scale="15 15 15" look-at="[gps-camera]"></a-text>
        </a-entity>

    </a-scene>

    <script>
        let pathIsReady = false;
        const goal = { lat: 28.370348, lon: 36.596865 };
        const distDisplay = document.getElementById('dist-text');

        window.addEventListener('gps-camera-update-position', (e) => {
            const myPos = e.detail.position;
            
            // تحديث عداد المسافة
            if (e.detail.distance !== undefined) {
                const distance = Math.round(e.detail.distance);
                distDisplay.innerText = distance + " متر";
                if(distance < 10) distDisplay.innerText = "🚩 وصلت للوجهة";
            }

            // رسم الأسهم "الطريق" مرة واحدة عند التقاط الإشارة
            if (!pathIsReady && myPos) {
                const scene = document.querySelector('a-scene');
                const arrowCount = 15; 

                for (let i = 1; i <= arrowCount; i++) {
                    const ratio = i / (arrowCount + 1);
                    const lat = myPos.latitude + (goal.lat - myPos.latitude) * ratio;
                    const lon = myPos.longitude + (goal.lon - myPos.longitude) * ratio;

                    const arrow = document.createElement('a-image');
                    arrow.setAttribute('src', '#arrow-tex');
                    arrow.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);
                    
                    // جعل السهم "طريق" مفروش على الأرض
                    arrow.setAttribute('rotation', '-90 0 0');
                    arrow.setAttribute('position', '0 -1.55 0'); 
                    arrow.setAttribute('scale', '5 8 5');
                    
                    // توجيه السهم نحو الهدف
                    arrow.setAttribute('look-at', '#lumi-destination');

                    // أنيميشن النبض (حيوي)
                    arrow.setAttribute('animation', {
                        property: 'opacity',
                        from: 0.3,
                        to: 1,
                        dur: 1000 + (i * 100),
                        dir: 'alternate',
                        loop: true
                    });

                    scene.appendChild(arrow);
                }
                pathIsReady = true;
            }
        });
    </script>
</body>
</html>
