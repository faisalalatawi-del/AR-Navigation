<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>Lumi AR - Ground Path</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <div style="position: fixed; top: 20px; width: 100%; text-align: center; z-index: 10; pointer-events: none;">
        <div style="background: rgba(0, 0, 0, 0.8); display: inline-block; padding: 15px 25px; border-radius: 20px; border: 2px solid #00FF00; color: white; font-family: Arial;">
            <div style="font-size: 10px; color: #00FF00;">المسافة المتبقية</div>
            <div id="distance-display" style="font-size: 24px; font-weight: bold;">انتظر إشارة الـ GPS...</div>
        </div>
    </div>

    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;">
        
        <a-assets>
            <img id="my-arrow" src="https://i.postimg.cc/brj5SLrn/240-F-341860718-Weyx-Hj3AZVe1gd-CRc0Yn4Wk296ew-LDmi-removebg-preview.png" crossorigin="anonymous">
            <img id="lumi-logo" src="https://i.postimg.cc/YqXwTKj3/Lumi-01.png" crossorigin="anonymous">
        </a-assets>

        <a-camera gps-camera="minDistance: 1;" rotation-reader far="10000"></a-camera>

        <a-entity id="lumi-target" gps-entity-place="latitude: 28.370348; longitude: 36.596865;">
            <a-image src="#lumi-logo" position="0 12 0" scale="8 8 8" look-at="[gps-camera]"></a-image>
            <a-cylinder color="#00FF00" height="500" radius="0.2" opacity="0.5"></a-cylinder>
            <a-text value="LUMI STATION" align="center" color="#00FF00" position="0 18 0" scale="15 15 15" look-at="[gps-camera]"></a-text>
        </a-entity>

    </a-scene>

    <script>
        let arrowsCreated = false;
        const targetLatLng = { lat: 28.370348, lon: 36.596865 };
        const distanceText = document.getElementById('distance-display');

        window.addEventListener('gps-camera-update-position', (e) => {
            const userPos = e.detail.position;
            
            // تحديث المسافة الرقمية
            if (e.detail.distance !== undefined) {
                distanceText.innerText = Math.round(e.detail.distance) + " متر";
            }

            // إنشاء الخطوط الأرضية مرة واحدة عند الحصول على الموقع
            if (!arrowsCreated && userPos) {
                generateGroundPath(userPos, targetLatLng);
                arrowsCreated = true;
            }
        });

        function generateGroundPath(start, end) {
            const scene = document.querySelector('a-scene');
            const steps = 15; // عدد الأسهم التي سيتم رسمها على الأرض

            for (let i = 1; i <= steps; i++) {
                const ratio = i / (steps + 1);
                // حساب إحداثيات السهم بين موقعك والهدف
                const lat = start.latitude + (end.lat - start.latitude) * ratio;
                const lon = start.longitude + (end.lon - start.longitude) * ratio;

                const arrow = document.createElement('a-image');
                arrow.setAttribute('src', '#my-arrow');
                arrow.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lon};`);
                
                // إعدادات السهم ليكون على الأرض تماماً
                arrow.setAttribute('scale', '4 8 4');
                arrow.setAttribute('rotation', '-90 0 0'); // تمديده على الأرض
                arrow.setAttribute('position', '0 -1.6 0'); // تحت مستوى الكاميرا ليكون أرضياً
                
                // توجيه السهم نحو الهدف
                arrow.setAttribute('look-at', '#lumi-target');
                
                scene.appendChild(arrow);
            }
            console.log("تم رسم الخطوط الأرضية الجغرافية.");
        }
    </script>
</body>
</html>
