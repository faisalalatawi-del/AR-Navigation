<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>AR Navigation - Green Arrows</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">
    <div style="position: fixed; top: 20px; width: 100%; text-align: center; z-index: 10; color: #00FF00; font-family: Arial; font-weight: bold; text-shadow: 2px 2px 4px black;">
        اتبع الأسهم الخضراء على الأرض
    </div>

    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <img id="my-arrow" src="https://i.ibb.co/v4m0f5V/green-arrow-transparent.png" crossorigin="anonymous">
        </a-assets>

        <a-camera gps-camera rotation-reader far="10000"></a-camera>

        <a-entity id="target" gps-entity-place="latitude: 24.4674; longitude: 39.6111;" visible="false"></a-entity>

    </a-scene>

    <script>
        let arrowsCreated = false;

        window.addEventListener('gps-camera-update-position', (e) => {
            if (arrowsCreated) return;

            const scene = document.querySelector('a-scene');
            const numArrows = 25; // عدد الأسهم
            const spacing = 5;    // المسافة بين الأسهم (5 متر)

            for (let i = 1; i <= numArrows; i++) {
                const arrow = document.createElement('a-plane');
                
                arrow.setAttribute('src', '#my-arrow');
                arrow.setAttribute('width', '1.5'); 
                arrow.setAttribute('height', '3');
                arrow.setAttribute('material', 'transparent: true; shader: flat;');
                
                // وضع السهم على الأرض مباشرة
                const zPos = -(i * spacing);
                arrow.setAttribute('position', `0 -1.6 ${zPos}`); 
                
                // جعل السهم مسطحاً على الأرض
                arrow.setAttribute('rotation', '-90 0 0');
                
                scene.appendChild(arrow);
            }
            arrowsCreated = true;
        });
    </script>
</body>
</html>
