<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <title>Lumi AR Pro</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .ui-container {
            position: fixed; top: 20px; width: 100%; text-align: center; z-index: 10; pointer-events: none;
        }
        .distance-card {
            background: rgba(10, 10, 10, 0.85);
            display: inline-block;
            padding: 12px 30px;
            border-radius: 15px;
            border-bottom: 4px solid #00FF00;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">
    <div class="ui-container">
        <div class="distance-card">
            <div style="font-size: 11px; color: #00FF00; text-transform: uppercase; margin-bottom: 2px;">المسافة إلى Lumi</div>
            <div id="distance-display" style="font-size: 26px; font-weight: 800; color: white;">جاري التحديد...</div>
        </div>
    </div>

    <a-scene vr-mode-ui="enabled: false" embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-assets>
            <img id="my-arrow" src="https://i.postimg.cc/brj5SLrn/240-F-341860718-Weyx-Hj3AZVe1gd-CRc0Yn4Wk296ew-LDmi-removebg-preview.png" crossorigin="anonymous">
            <img id="lumi-logo" src="https://i.postimg.cc/YqXwTKj3/Lumi-01.png" crossorigin="anonymous">
        </a-assets>

        <a-camera gps-camera rotation-reader far="10000"></a-camera>

        <a-entity id="destination" gps-entity-place="latitude: 28.370345; longitude: 36.596866;">
            <a-image src="#lumi-logo" position="0 6 0" scale="7 7 7" animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear"></a-image>
            <a-cylinder color="#00FF00" height="300" radius="0.1" opacity="0.2"></a-cylinder>
            <a-text value="LUMI" align="center" color="#00FF00" position="0 10 0" scale="12 12 12"></a-text>
        </a-entity>
    </a-scene>

    <script>
        let arrowsCreated = false;
        const distTxt = document.getElementById('distance-display');

        window.addEventListener('gps-camera-update-position', (e) => {
            if (e.detail.distance !== undefined) {
                const d = Math.round(e.detail.distance);
                distTxt.innerText = d > 5 ? d + " متر" : "🏁 وصلت لوجهتك";
                if(d <= 5) distTxt.style.color = "#FFD700";
            }

            if (arrowsCreated) return;
            const scene = document.querySelector('a-scene');
            for (let i = 1; i <= 35; i++) {
                const arrow = document.createElement('a-plane');
                arrow.setAttribute('src', '#my-arrow');
                arrow.setAttribute('width', '2.2'); arrow.setAttribute('height', '4.5');
                arrow.setAttribute('material', 'transparent: true; shader: flat;');
                arrow.setAttribute('position', `0 -1.55 ${-(i * 4.5)}`);
                arrow.setAttribute('rotation', '-90 0 0');
                // إضافة حركة النبض
                arrow.setAttribute('animation', 'property: scale; from: 1 1 1; to: 1.1 1.1 1; dur: 800; dir: alternate; loop: true; easing: easeInOutQuad');
                scene.appendChild(arrow);
            }
            arrowsCreated = true;
        });
    </script>
</body>
</html>
